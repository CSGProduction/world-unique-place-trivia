<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teka-Teki Dunia: 100 Level</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .game-card {
            background: #16213e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            background: #e94560;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .badge {
            background: #4ecca3;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .clue { font-size: 1.2rem; margin: 20px 0; min-height: 60px; line-height: 1.5; }
        .hint-display {
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #ffca28;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-box { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-check { background: #e94560; color: white; }
        .btn-hint { background: #4ecca3; color: #1a1a2e; }
        .feedback { margin-top: 15px; height: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">
        <span id="lvlTxt">Level: 1/100</span>
        <span id="scrTxt">Skor: 0</span>
    </div>
    
    <div id="regionBadge" class="badge">Asia</div>
    <h3 id="countryTxt" style="margin: 10px 0; color: #e94560;">Negara</h3>
    <div id="clueTxt" class="clue">Memuat petunjuk...</div>
    
    <div id="hintTxt" class="hint-display"></div>
    
    <input type="text" id="ansInput" placeholder="Jawabanmu..." autocomplete="off">
    
    <div class="btn-box">
        <button class="btn-hint" onclick="useHint()">💡 Hint (-5)</button>
        <button class="btn-check" id="mainBtn" onclick="handleAction()">Jawab!</button>
    </div>
    
    <div id="feedTxt" class="feedback"></div>
</div>

        // EROPA

        {c:"Irlandia", q:"Tebing hijau terjal yang menghadap Atlantik.", a:"Cliffs of Moher", r:"Eropa"},
        {c:"Swedia", q:"Hotel yang seluruh bangunannya terbuat dari es.", a:"Icehotel", r:"Eropa"},
        {c:"Turki", q:"Kota yang berada di dua benua (Sisi Eropa).", a:"Istanbul", r:"Eropa"},
        {c:"Swiss", q:"Kota di tepi danau dengan jembatan kayu Chapel.", a:"Lucerne", r:"Eropa"},
        {c:"Prancis", q:"Istana termegah tempat tinggal Raja Louis XIV.", a:"Versailles", r:"Eropa"},
        {c:"Italia", q:"Kota kuno yang terkubur debu vulkanik.", a:"Pompeii", r:"Eropa"},
        {c:"Inggris", q:"Kincir ria raksasa di tepi sungai Thames.", a:"London Eye", r:"Eropa"}
    ];

    let current = 0;
    let score = 0;
    let hIndex = 0;

    function init() {
        if(current >= levels.length) {
            document.body.innerHTML = `<div class='game-card'><h1>🎉 TAMAT!</h1><p>Skor Akhir: ${score}</p><button onclick='location.reload()'>Main Lagi</button></div>`;
            return;
        }
        const lv = levels[current];
        document.getElementById('lvlTxt').innerText = `Level: ${current + 1}/100`;
        document.getElementById('regionBadge').innerText = lv.r;
        document.getElementById('countryTxt').innerText = lv.c;
        document.getElementById('clueTxt').innerText = lv.q;
        document.getElementById('ansInput').value = "";
        document.getElementById('feedTxt').innerText = "";
        document.getElementById('mainBtn').innerText = "Jawab!";
        document.getElementById('mainBtn').onclick = check;
        hIndex = 0;
        showHint();
    }

    function showHint() {
        const ans = levels[current].a;
        let str = "";
        for(let i=0; i<ans.length; i++) {
            if(ans[i] === " ") str += " ";
            else if(i < hIndex) str += ans[i];
            else str += "_";
        }
        document.getElementById('hintTxt').innerText = str;
    }

    function useHint() {
        if(score >= 5) {
            if(hIndex < levels[current].a.length) {
                hIndex++;
                score -= 5;
                document.getElementById('scrTxt').innerText = `Skor: ${score}`;
                showHint();
            }
        } else {
            alert("Skor minimal 5 untuk hint!");
        }
    }

    function check() {
        const user = document.getElementById('ansInput').value.toLowerCase().replace(/\s/g, '');
        const real = levels[current].a.toLowerCase().replace(/\s/g, '');
        if(user === real) {
            score += 20;
            document.getElementById('scrTxt').innerText = `Skor: ${score}`;
            document.getElementById('feedTxt').style.color = "#4ecca3";
            document.getElementById('feedTxt').innerText = "BENAR! +20";
            document.getElementById('mainBtn').innerText = "Lanjut";
            document.getElementById('mainBtn').onclick = next;
        } else {
            document.getElementById('feedTxt').style.color = "#e94560";
            document.getElementById('feedTxt').innerText = "SALAH! Coba lagi.";
        }
    }

    function next() {
        current++;
        init();
    }

    init();
</script>
</body>
</html>
